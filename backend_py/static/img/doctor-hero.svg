<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9d5ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="secondaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.12"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="500" fill="url(#bgGradient)" rx="24"/>
  
  <!-- Floating circles decoration -->
  <circle cx="100" cy="80" r="35" fill="#dbeafe" opacity="0.3"/>
  <circle cx="420" cy="420" r="45" fill="#ddd6fe" opacity="0.25"/>
  <circle cx="450" cy="100" r="25" fill="#fce7f3" opacity="0.2"/>
  
  <!-- Doctor Character -->
  <g id="doctor" filter="url(#shadow)">
    <!-- Head -->
    <circle cx="250" cy="110" r="40" fill="#f8ad9d"/>
    
    <!-- Hair -->
    <path d="M 210 100 Q 210 60 250 60 Q 290 60 290 100 Q 290 70 250 70 Q 210 70 210 100" fill="#2d1810"/>
    
    <!-- Stethoscope around neck -->
    <path d="M 220 130 Q 250 150 280 130" stroke="#4f46e5" stroke-width="5" fill="none" stroke-linecap="round"/>
    <circle cx="235" cy="155" r="7" fill="none" stroke="#4f46e5" stroke-width="4"/>
    <circle cx="265" cy="155" r="7" fill="none" stroke="#4f46e5" stroke-width="4"/>
    
    <!-- White coat body -->
    <path d="M 210 150 L 200 280 Q 200 290 210 290 L 290 290 Q 300 290 300 280 L 290 150 Z" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
    
    <!-- Coat lapels -->
    <path d="M 250 150 L 230 220 L 220 290" stroke="#e5e7eb" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M 250 150 L 270 220 L 280 290" stroke="#e5e7eb" stroke-width="1.5" fill="none" opacity="0.6"/>
    
    <!-- Blue inner shirt -->
    <rect x="230" y="160" width="40" height="50" rx="6" fill="url(#secondaryGrad)"/>
    
    <!-- Medical badge/ID -->
    <rect x="235" y="220" width="30" height="40" rx="4" fill="#fff" stroke="url(#primaryGrad)" stroke-width="2"/>
    <line x1="240" y1="230" x2="260" y2="230" stroke="url(#primaryGrad)" stroke-width="1.5"/>
    <line x1="240" y1="240" x2="260" y2="240" stroke="url(#primaryGrad)" stroke-width="1"/>
    <line x1="240" y1="250" x2="255" y2="250" stroke="url(#primaryGrad)" stroke-width="1"/>
    
    <!-- Left arm holding clipboard -->
    <g>
      <rect x="130" y="160" width="80" height="26" rx="13" fill="#f8ad9d"/>
      <circle cx="125" cy="173" r="18" fill="#f8ad9d"/>
      <!-- Clipboard -->
      <rect x="105" y="155" width="35" height="48" rx="3" fill="#fff" stroke="#4f46e5" stroke-width="2.5"/>
      <circle cx="117" cy="160" r="3" fill="#4f46e5"/>
      <!-- Clipboard content -->
      <line x1="110" y1="172" x2="135" y2="172" stroke="#4f46e5" stroke-width="1.5"/>
      <line x1="110" y1="180" x2="135" y2="180" stroke="#4f46e5" stroke-width="1.5"/>
      <line x1="110" y1="188" x2="130" y2="188" stroke="#4f46e5" stroke-width="1.5"/>
      <line x1="110" y1="196" x2="135" y2="196" stroke="#4f46e5" stroke-width="1.5"/>
    </g>
    
    <!-- Right arm with heart/health icon -->
    <g>
      <rect x="290" y="160" width="80" height="26" rx="13" fill="#f8ad9d"/>
      <circle cx="375" cy="173" r="18" fill="#f8ad9d"/>
      <!-- Heart pulse monitor -->
      <rect x="360" y="155" width="45" height="36" rx="4" fill="#fff" stroke="#ec4899" stroke-width="2"/>
      <!-- Pulse line -->
      <path d="M 365 178 L 375 178 L 378 170 L 382 178 L 390 178 L 395 170 L 398 178 L 400 178" 
            stroke="#ec4899" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <!-- Legs -->
    <rect x="235" y="290" width="12" height="75" fill="#1e40af" rx="6"/>
    <rect x="253" y="290" width="12" height="75" fill="#1e40af" rx="6"/>
    
    <!-- Shoes -->
    <ellipse cx="241" cy="370" rx="15" ry="10" fill="#0f172a"/>
    <ellipse cx="259" cy="370" rx="15" ry="10" fill="#0f172a"/>
  </g>
  
  <!-- Floating elements -->
  <!-- Plus symbol (top right) -->
  <g id="plus-icon" opacity="0.7">
    <rect x="400" y="150" width="4" height="24" fill="url(#secondaryGrad)" rx="2"/>
    <rect x="388" y="162" width="24" height="4" fill="url(#secondaryGrad)" rx="2"/>
  </g>
  
  <!-- Heart (bottom left) -->
  <g id="heart-icon" opacity="0.6">
    <path d="M 80 420 C 80 410 88 405 95 405 C 102 405 108 410 108 420 C 108 410 114 405 121 405 C 128 405 136 410 136 420 Q 136 435 108 455 Q 80 435 80 420" 
          fill="#ec4899"/>
  </g>
  
  <!-- Shield/Security (top left) -->
  <g id="shield-icon" opacity="0.5">
    <path d="M 60 80 L 80 70 L 80 100 Q 80 120 70 130 Q 60 120 60 100 Z" 
          fill="url(#primaryGrad)" stroke="#4f46e5" stroke-width="2"/>
    <path d="M 68 95 L 72 100 L 78 92" 
          stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
