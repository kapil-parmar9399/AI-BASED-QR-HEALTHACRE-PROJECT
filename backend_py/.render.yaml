services:
  - type: web
    name: qr-healthcare
    env: python
    runtime: "python-3.11.8"
    buildCommand: |
      pip install --upgrade pip setuptools wheel
      pip install numpy==1.24.3 --only-binary :all:
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000