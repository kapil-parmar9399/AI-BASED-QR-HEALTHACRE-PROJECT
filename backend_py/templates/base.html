<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Swasthya</title>
    <meta name="description" content="Swasthya AI — AI-powered healthcare assistant: appointments, patient records, secure uploads." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script defer src="/static/js/main.js"></script>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container">
        <a class="navbar-brand" href="/">Swasthya AI</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMain">
          <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="/patients">Patients</a></li>
            <li class="nav-item"><a class="nav-link" href="/doctors">Doctors</a></li>
            <li class="nav-item"><a class="nav-link" href="/appointments">Appointments</a></li>
          </ul>
          <ul class="navbar-nav ms-auto">
            {% if user %}
            <li class="nav-item"><span class="nav-link">Hello, {{ user }}</span></li>
            <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
            {% else %}
            <li class="nav-item"><a class="nav-link" href="/login">Login</a></li>
            <li class="nav-item"><a class="nav-link btn btn-primary text-white ms-2" href="/register">Get Started</a></li>
            {% endif %}
          </ul>
        </div>
      </div>
    </nav>
    <div class="container py-5">
      {% block content %}{% endblock %}
    </div>
    <footer class="text-center py-4">
      <div class="container">&copy; 2026 Swasthya</div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
