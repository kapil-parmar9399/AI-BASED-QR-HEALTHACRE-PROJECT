{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0">🔐 Sign In to Swasthya</h5>
                </div>
                <div class="card-body">
                    {% if error %}
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        {{ error }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    {% endif %}

                    <form method="POST" action="/login">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" name="username" required autofocus>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>

                        <button type="submit" class="btn btn-success w-100 mb-3">Sign In</button>
                    </form>

                    <hr>

                    <p class="text-center mb-0">
                        Don't have an account? 
                        <a href="/register" class="text-decoration-none">Create one →</a>
                    </p>
                </div>
            </div>

            <!-- Demo Credentials -->
            <div class="alert alert-info mt-4" role="alert">
                <strong>🧪 Demo Credentials:</strong>
                <ul class="mb-0 mt-2">
                    <li><strong>Patient:</strong> patient1 / patient</li>
                    <li><strong>Doctor:</strong> doctor1 / doctor</li>
                    <li><strong>Admin:</strong> admin / admin</li>
                </ul>
            </div>
        </div>
    </div>
</div>
{% endblock %}
