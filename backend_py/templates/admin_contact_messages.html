{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <h2>📩 Contact Messages</h2>

    <table class="table table-bordered mt-3">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Message</th>
                <th>Date</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for msg in messages %}
            <tr>
                <td>{{ msg.name }}</td>
                <td>{{ msg.email }}</td>
                <td>{{ msg.message }}</td>
                <td>{{ msg.created_at.strftime('%Y-%m-%d %H:%M') if msg.created_at }}</td>
                <td>
                    <form action="/admin/contact/delete/{{ msg._id }}" method="post"
                          onsubmit="return confirm('Are you sure you want to delete this message?');">
                        <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <a href="/admin/dashboard" class="btn btn-info mt-3">Back to Dashboard</a>
</div>
{% endblock %}
