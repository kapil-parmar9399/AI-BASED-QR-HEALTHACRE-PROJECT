{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">📲 Verify Mobile Number</h5>
                </div>
                <div class="card-body">
                    {% if error %}
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        {{ error }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    {% endif %}

                    <form method="POST" action="/register/phone">
                        <div class="mb-3">
                            <label for="phone" class="form-label">Mobile Number</label>
                            <input type="tel" class="form-control" id="phone" name="phone" value="{{ phone or '' }}" required placeholder="+91xxxxxxxxxx" pattern="(\+[1-9]\d{9,14}|\d{10,15})">
                            <small class="text-muted">We will send an OTP to this number</small>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Send OTP</button>
                    </form>
                </div>
            </div>

            <p class="text-center mt-3 mb-0">
                Already have an account?
                <a href="/login" class="text-decoration-none">Sign In →</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
