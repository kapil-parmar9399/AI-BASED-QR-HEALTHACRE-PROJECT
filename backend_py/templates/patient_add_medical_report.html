{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row mb-4">
        <div class="col-md-8">
            <h2 class="mb-2">📄 Add Medical Report</h2>
            <p class="text-muted">Upload your prescription or medical report</p>
        </div>
        <div class="col-md-4 text-end">
            <a href="/patient/records" class="btn btn-sm btn-secondary">← Back to Records</a>
        </div>
    </div>

    {% if success %}
        <div class="alert alert-success alert-dismissible fade show" role="alert">
            ✅ Report uploaded successfully.
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    {% endif %}

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label"><strong>📎 Select File</strong> <span class="text-danger">*</span></label>
                    <input type="file" class="form-control" name="report_file" required>
                    <small class="text-muted">Upload PDF, Image or any medical report</small>
                </div>

                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                    <a href="/patient/records" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary btn-lg">⬆️ Upload Report</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
