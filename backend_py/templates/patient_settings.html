<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Patient Settings</title>
    <link href="/static/css/style.css" rel="stylesheet">
  </head>
  <body>
    <div class="container mt-4">
      <h2>Patient Settings</h2>
      {% if message %}
        <div class="alert alert-info">{{ message }}</div>
      {% endif %}

      <form method="post" action="/patient/settings">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" value="{{ patient.get('email', '') }}" />
        </div>
        <div class="mb-3">
          <label class="form-label">Phone (E.164 format)</label>
          <input type="tel" name="contact" class="form-control" value="{{ patient.get('contact', '') }}"
                 pattern="(\+[1-9]\d{9,14}|\d{10,15})" />
        </div>

        <div class="d-flex gap-2">
          <button type="submit" name="action" value="save" class="btn btn-primary">Save</button>
          <button type="submit" name="action" value="send_test_email" class="btn btn-secondary">Send Test Email</button>
          <button type="submit" name="action" value="send_test_sms" class="btn btn-secondary">Send Test SMS</button>
        </div>
      </form>

      <hr />
      <h4>QR Access</h4>
      <p>You can regenerate your public QR access token from the QR page.</p>
      <a class="btn btn-outline-primary" href="/patient/qrcode">Open QR Page</a>
    </div>
  </body>
</html>
